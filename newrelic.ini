; ---------------------------------------------------------------------------
; New Relic Python agent configuration
; License key and app name are injected at runtime via environment variables
; NEW_RELIC_LICENSE_KEY, NEW_RELIC_APP_NAME.
; See: https://docs.newrelic.com/docs/apm/agents/python-agent/configuration/python-agent-configuration/
; ---------------------------------------------------------------------------

[newrelic]
app_name = insurance-charge-predictor
monitor_mode = true
log_level = info
log_file = stderr
ssl = true
high_security = false
transaction_tracer.enabled = true
transaction_tracer.transaction_threshold = apdex_f
transaction_tracer.record_sql = obfuscated
transaction_tracer.stack_trace_threshold = 0.5
error_collector.enabled = true
error_collector.ignore_errors =
browser_monitoring.auto_instrument = true
thread_profiler.enabled = true
distributed_tracing.enabled = true

[newrelic:development]
monitor_mode = false

[newrelic:staging]
app_name = insurance-charge-predictor (staging)
monitor_mode = true

[newrelic:production]
monitor_mode = true
