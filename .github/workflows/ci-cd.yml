name: CI-CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/insurance-app

jobs:
  train-and-select:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt
      - name: Run tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q
      - name: Reproduce DVC pipeline
        run: dvc repro
      - name: Show leaderboard
        run: python -c "import json; print(json.dumps(json.load(open('models/metrics_comparison.json')), indent=2))"
      - name: Upload model bundle
        uses: actions/upload-artifact@v4
        with:
          name: model-bundle
          path: |
            models/model.pkl
            models/metrics.json
            models/metrics_comparison.json
            models/candidates/
            data/insurance.csv
            dvc.yaml
            mlruns/
            registry/champion.json

  build-image:
    needs: train-and-select
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: model-bundle }
      - name: Lowercase image name
        run: echo "IMAGE=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}