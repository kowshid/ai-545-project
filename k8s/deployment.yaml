apiVersion: apps/v1
kind: Deployment
metadata:
  name: insurance-app-deployment
  labels:
    app: insurance-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: insurance-app
  template:
    metadata:
      labels:
        app: insurance-app
    spec:
      containers:
        - name: insurance-app
          # Replace <your-github-user> once, or set up CI to sed this at apply time.
          # Must be lowercase. Make the GHCR package public OR add an imagePullSecret.
          image: ghcr.io/kowshid/insurance-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: API_SERVER_PORT
              value: "8000"
            - name: NEW_RELIC_APP_NAME
              value: "insurance-charge-predictor"
            # Optional — populated from the Secret below; pod starts fine without it
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: newrelic-secret
                  key: license_key
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      # Uncomment and create the secret if the GHCR package is private:
      # imagePullSecrets:
      #   - name: ghcr-pull-secret