# Example Secret manifest for the New Relic license key.
# DO NOT COMMIT a real key. Create from the command line:
#
#   kubectl create secret generic newrelic-secret \
#     --from-literal=license_key=YOUR_NEW_RELIC_LICENSE_KEY
#
# The Deployment references it through secretKeyRef (with optional: true),
# so the pod will also start without it (in which case New Relic is disabled).
apiVersion: v1
kind: Secret
metadata:
  name: newrelic-secret
type: Opaque
stringData:
  license_key: ""
