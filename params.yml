# ======================================================
# params.yml — configuration for the Insurance Predictor
# ======================================================

data:
  url: "https://raw.githubusercontent.com/stedy/Machine-Learning-with-R-datasets/master/insurance.csv"
  local_path: "data/insurance.csv"

features:
  age:
    min: 18
    max: 64
    default: 30
  bmi:
    min: 15.0
    max: 55.0
    default: 27.5
    step: 0.1
  children:
    min: 0
    max: 5
    default: 0
  sex:
    - female
    - male
  smoker:
    - "no"
    - "yes"
  region:
    - northeast
    - northwest
    - southeast
    - southwest

target: charges

# ---- Multi-model training ----
# Each entry is one MLflow run. The challenger is the run with the best score on `selection_metric` 
#  (higher is better for r2, lower is better for mae / rmse).
training:
  test_size: 0.2
  random_state: 97
  selection_metric: r2          # one of: r2, mae, rmse
  candidates:
    - name: rf_300_d10
      type: RandomForestRegressor
      params:
        n_estimators: 300
        max_depth: 10
        min_samples_split: 4
        min_samples_leaf: 2
        random_state: 97
        n_jobs: -1

    - name: rf_500_d20
      type: RandomForestRegressor
      params:
        n_estimators: 500
        max_depth: 20
        min_samples_split: 2
        min_samples_leaf: 1
        random_state: 97
        n_jobs: -1

    - name: gbr_200_lr005
      type: GradientBoostingRegressor
      params:
        n_estimators: 200
        learning_rate: 0.05
        max_depth: 4
        random_state: 97

    - name: gbr_400_lr003
      type: GradientBoostingRegressor
      params:
        n_estimators: 400
        learning_rate: 0.03
        max_depth: 3
        random_state: 97

    - name: linreg_baseline
      type: LinearRegression
      params: { }

mlflow:
  experiment_name: "insurance-charge-predictor"
  tracking_uri: "./mlruns"
  registered_model_name: "InsuranceCharges"

paths:
  model: "models/model.pkl"
  metrics: "models/metrics.json"

app:
  title: "Insurance Charge Predictor"
  description: "A demo web application for exploring the insurance dataset and predicting estimated medical charges."
  port: 8501