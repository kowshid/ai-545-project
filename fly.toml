# fly.toml app configuration file generated for insurance-charge-predictor on 2026-04-19T20:13:41-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'insurance-charge-predictor'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  NEW_RELIC_APP_NAME = 'insurance-charge-predictor'
  STREAMLIT_BROWSER_GATHER_USAGE_STATS = 'false'
  STREAMLIT_SERVER_ADDRESS = '0.0.0.0'
  STREAMLIT_SERVER_PORT = '8501'

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/_stcore/health'
    protocol = 'http'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
